global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'opencampus-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API Gateway metrics
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['localhost:3001']
    metrics_path: '/metrics'

  # SIS Service metrics
  - job_name: 'sis-service'
    static_configs:
      - targets: ['localhost:3002']
    metrics_path: '/metrics'

  # Admissions Service metrics
  - job_name: 'admissions-service'
    static_configs:
      - targets: ['localhost:3003']
    metrics_path: '/metrics'

  # Financial Aid Service metrics
  - job_name: 'financial-aid-service'
    static_configs:
      - targets: ['localhost:3004']
    metrics_path: '/metrics'

  # ERP Service metrics
  - job_name: 'erp-service'
    static_configs:
      - targets: ['localhost:3005']
    metrics_path: '/metrics'

  # HR Service metrics
  - job_name: 'hr-service'
    static_configs:
      - targets: ['localhost:3006']
    metrics_path: '/metrics'

  # Analytics Service metrics
  - job_name: 'analytics-service'
    static_configs:
      - targets: ['localhost:3007']
    metrics_path: '/metrics'

  # AI Platform Service metrics
  - job_name: 'ai-platform-service'
    static_configs:
      - targets: ['localhost:3008']
    metrics_path: '/metrics'

  # Workflow Engine metrics
  - job_name: 'workflow-engine'
    static_configs:
      - targets: ['localhost:3009']
    metrics_path: '/metrics'

  # PostgreSQL exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Kafka exporter
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  # ClickHouse metrics
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:8123']

  # Node Exporter
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
